;webservice config
[webservice]
port = 24529
wechat_wait = 4

;num_cpu config
[num_cpu]
ratio = 0.75

;redis config
[redis]
host = chatwiki_redis_service
port = 6379
password = redis_password

;postgres config
[postgres]
host = chatwiki_postgres_service
port = 5432
user = chatwiki
password = postgres_password
dbname = chatwiki
sslmode = disable

[nsqlookup]
host = chatwiki_go_nsq_service
port = 4161

[nsqd]
host = chatwiki_go_nsq_service
port = 4150

;messenger config
[messenger]
graph_api_base = https://graph.facebook.com/v25.0

;telegram config
[telegram]
api_base = https://api.telegram.org

